# HTTP — certbot challenge + redirect
server {
    listen 80;
    server_name emirotobusparca.com www.emirotobusparca.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://emirotobusparca.com$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name emirotobusparca.com www.emirotobusparca.com;

    ssl_certificate     /etc/letsencrypt/live/emirotobusparca.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emirotobusparca.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;

    # API proxy
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Static uploads served by API (wwwroot)
    location /uploads/ {
        proxy_pass         http://api:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_valid  200 7d;
        add_header         Cache-Control "public, max-age=604800";
    }

    # React SPA
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}
